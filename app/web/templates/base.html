<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SQL Agent{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/pages.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar" aria-label="主導覽">
      <div class="sidebar-logo">SQL <span class="sidebar-logo-accent">Agent</span></div>
      <div class="sidebar-nav">
        <a class="sidebar-nav-link{% if active_page == 'index' %} is-active{% endif %}"
           href="{{ url_for('web_index') }}" data-nav="index">首頁</a>
        <a class="sidebar-nav-link{% if active_page == 'agent' %} is-active{% endif %}"
           href="{{ url_for('web_agent') }}" data-nav="agent">資料庫助手</a>
        <a class="sidebar-nav-link{% if active_page == 'settings' %} is-active{% endif %}"
           href="{{ url_for('web_settings') }}" data-nav="settings">設定</a>
      </div>
      <div class="sidebar-footer">SQL Agent v2</div>
    </nav>
    <div class="main-content">
      <header class="topbar">
        <span class="topbar-title">{% block page_title %}{% endblock %}</span>
        <div class="topbar-spacer"></div>
        {% block topbar_actions %}{% endblock %}
      </header>
      <main class="page-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack" data-target="toast-stack"></div>

  {% block scripts %}{% endblock %}
</body>
</html>
